<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Agent loop</title>
  <desc id="desc">User request flows to host, model, tools, and back until final answer.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
    <style>
      text { fill: #e6edf3; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 22px; font-weight: 700; }
      .small { fill: #8b949e; font-size: 15px; font-weight: 500; }
      .box { fill: #161b22; stroke: #58a6ff; stroke-width: 2; rx: 18; }
      .line { fill: none; stroke: #58a6ff; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="box" x="35" y="120" width="150" height="86"/>
  <text x="110" y="158" text-anchor="middle">User</text>
  <text class="small" x="110" y="184" text-anchor="middle">intent</text>
  <rect class="box" x="275" y="120" width="150" height="86"/>
  <text x="350" y="158" text-anchor="middle">Host app</text>
  <text class="small" x="350" y="184" text-anchor="middle">state + policy</text>
  <rect class="box" x="515" y="120" width="150" height="86"/>
  <text x="590" y="158" text-anchor="middle">Model</text>
  <text class="small" x="590" y="184" text-anchor="middle">text or tool call</text>
  <rect class="box" x="755" y="120" width="150" height="86"/>
  <text x="830" y="158" text-anchor="middle">Tools</text>
  <text class="small" x="830" y="184" text-anchor="middle">host executes</text>
  <path class="line" d="M185 163 H270"/>
  <path class="line" d="M425 163 H510"/>
  <path class="line" d="M665 163 H750"/>
  <path class="line" d="M830 210 C830 300 350 300 350 214"/>
  <path class="line" d="M590 115 C590 58 350 58 350 115"/>
  <text class="small" x="590" y="290" text-anchor="middle">tool result returns to conversation</text>
  <text class="small" x="470" y="54" text-anchor="middle">loop until final answer</text>
</svg>
